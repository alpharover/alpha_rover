name: Sensors CI

on:
  pull_request:
    paths:
      - 'alpha_ws/third_party/**'
      - 'alpha_ws/src/**'
      - '.github/workflows/sensors.yml'

jobs:
  build-sensors:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Enforce colcon arg order policy
        run: |
          # Check only actual colcon build lines, not enforcement lines
          # Must NOT have cmake-args before packages-select on any colcon line
          if grep -nE '^[[:space:]]*colcon build[[:space:]].*--cmake-args[[:space:]].* --packages-select' .github/workflows/sensors.yml; then
            echo "::error ::Use packages-first colcon form in sensors.yml"; exit 1;
          fi
      - name: Setup ROS 2 apt sources
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: humble
      - name: Install ROS 2 tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-vcstool python3-colcon-common-extensions python3-rosdep
          sudo rosdep init || true
          rosdep update
      - name: Install core ROS deps for LiDAR build (smoke)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake \
            libyaml-cpp-dev \
            ros-humble-rclcpp \
            ros-humble-sensor-msgs \
            ros-humble-std-msgs \
            ros-humble-diagnostic-msgs
      - name: Import third-party sources
        run: |
          mkdir -p alpha_ws/third_party/src
          if [ -f alpha_ws/third_party/manifests/sensors.repos ]; then
            vcs import alpha_ws/third_party/src < alpha_ws/third_party/manifests/sensors.repos
          fi
      - name: Resolve deps
        run: |
          rosdep install -i -r --from-paths alpha_ws/third_party/src --rosdistro humble -y || true
      - name: Build third-party (smoke)
        run: |
          set -e
          cd alpha_ws
          colcon build --event-handlers console_cohesion+ --packages-up-to rslidar_sdk rslidar_msg || true
      - name: Resolve core workspace deps (smoke)
        run: |
          rosdep install -i -r --from-paths alpha_ws/src --rosdistro humble -y || true
      - name: Build core LiDAR packages (smoke)
        run: |
          set -e
          cd alpha_ws
          colcon build --event-handlers console_cohesion+ \
            --packages-select alpha_lidar_airy_cpp alpha_lidar_airy alpha_bringup alpha_testing \
            --cmake-args -DCMAKE_BUILD_TYPE=Release -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
