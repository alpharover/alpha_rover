name: CI

on:
  push:
    branches: [ trunk ]
  pull_request:
    branches: [ trunk, main, '**' ]

jobs:
  docs:
    name: Docs Validation
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install pre-commit
        run: pipx install pre-commit
      - name: Run pre-commit (agents index + validate)
        run: |
          pre-commit run --all-files || (echo 'Expected to update docs/AGENTS_INDEX.md; please commit.' && git --no-pager diff && exit 1)

  build:
    name: ROS 2 Build (Humble)
    runs-on: ubuntu-22.04
    env:
      ALPHA_WS: alpha_ws
      PKG_TARGET: alpha_bringup
    steps:
      - uses: actions/checkout@v4
      - name: Setup ROS 2 apt sources
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: humble
      - name: Install base build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ros-humble-ros-base \
            python3-colcon-common-extensions \
            python3-colcon-ros \
            ros-dev-tools \
            build-essential \
            cmake \
            python3-setuptools \
            python3-pip \
            python3-wheel \
            python3-rosdep \
            libyaml-cpp-dev \
            libcurl4-openssl-dev
      - name: Resolve ROS package deps (rosdep)
        shell: bash
        run: |
          set -euxo pipefail
          # Initialize rosdep databases if needed
          sudo rosdep init || true
          # Retry rosdep update in case of transient network hiccups
          for i in 1 2 3; do
            if rosdep update; then
              break
            fi
            echo "rosdep update failed (attempt $i). Retrying..."
            sleep 5
          done
          # Attempt to install dependencies from package.xml files
          set +e
          rosdep install --rosdistro humble --from-paths "$ALPHA_WS" -i -y
          rc=$?
          set -e
          if [ $rc -ne 0 ]; then
            echo "::warning::rosdep install failed with code $rc. Falling back to apt for common ROS deps."
            sudo apt-get update
            sudo apt-get install -y \
              ros-humble-rosidl-default-generators \
              ros-humble-rosidl-default-runtime \
              ros-humble-std-msgs \
              ros-humble-diagnostic-msgs \
              ros-humble-rclpy \
              python3-yaml || true
          fi
      - name: Show discovered packages
        shell: bash
        run: |
          set -euo pipefail
          source /opt/ros/humble/setup.bash
          cd "$ALPHA_WS"
          colcon list || true
      - name: Build (packages-up-to ${{ env.PKG_TARGET }})
        shell: bash
        run: |
          set -euo pipefail
          source /opt/ros/humble/setup.bash
          cd "$ALPHA_WS"
          colcon build --merge-install --packages-up-to "$PKG_TARGET" --cmake-args -DCMAKE_BUILD_TYPE=Release
      - name: Test (packages-up-to ${{ env.PKG_TARGET }})
        shell: bash
        run: |
          set -euo pipefail
          source /opt/ros/humble/setup.bash
          cd "$ALPHA_WS"
          colcon test --merge-install --packages-up-to "$PKG_TARGET"
          colcon test-result --verbose
