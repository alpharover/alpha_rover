vertical_angle_table_path: airy_vertical_angles.csv
reorder_enabled: true
log_table_hash: true
expected_dims: { height: 96, width: 900 }
fov:
  min_angle_below_zero_elevation_rad: -0.001
  max_angle_above_zero_elevation_rad: 1.5707963
range_m: { min: 0.10, max: 60.0 }

# HTTP endpoint config for AIRY op-mode control (confirm against device docs)
http:
  endpoints:
    run:
      method: POST
      path: "/api/operation_mode"
      body: '{"mode": 1}'
      headers: { Content-Type: application/json }
    standby:
      method: POST
      path: "/api/operation_mode"
      body: '{"mode": 0}'
      headers: { Content-Type: application/json }
  timeout_sec: 1.0

# Optional, config-driven HTTP control block (disabled by default)
# When enabled, mode_service builds requests from this section and does a
# light verification via setting_data.json if verify_after_set:=true.
airy_http:
  enabled: false
  endpoints:
    front:
      base_url: "http://192.168.1.200"
      mode_path: "/api/mode"
      # method: POST
      # headers: { Content-Type: application/json }
      # payload_run: '{"mode":"RUN"}'
      # payload_standby: '{"mode":"STANDBY"}'
    rear:
      base_url: "http://192.168.1.201"
      mode_path: "/api/mode"
      # method: POST
      # headers: { Content-Type: application/json }
      # payload_run: '{"mode":"RUN"}'
      # payload_standby: '{"mode":"STANDBY"}'
  timeouts_ms:
    connect: 400
    read: 400
  retries: 2
  backoff_ms: 150
